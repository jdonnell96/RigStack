name: Version Check

on:
  schedule:
    - cron: "0 6 * * *" # 6am UTC daily
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Check for stale manifests
        run: python scripts/check_versions.py

      - name: Create issues for stale tools
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f stale_tools.json ]; then
            python scripts/create_stale_issues.py
          fi
